# Dev profile: H2 in-memory DB, seeded at startup.
spring:
  datasource:
    url: jdbc:h2:mem:chhub;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/seed-h2.sql
      continue-on-error: false
  h2:
    console:
      enabled: true
      path: /h2
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

ch:
  editlock:
    backend: memory    # memory | redis ; dev default uses in-memory

logging:
  level:
    com.claudecode.hub: DEBUG
