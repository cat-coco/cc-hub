spring:
  datasource:
    url: ${CH_DB_URL:jdbc:mysql://mysql:3306/chhub?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${CH_DB_USER:chhub}
    password: ${CH_DB_PASSWORD:chhub_pwd}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 12
      minimum-idle: 4
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${CH_REDIS_HOST:redis}
      port: ${CH_REDIS_PORT:6379}
      password: ${CH_REDIS_PASSWORD:}
