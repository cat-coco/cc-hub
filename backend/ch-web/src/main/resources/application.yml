spring:
  application:
    name: claudecode-hub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: "1"
    table: flyway_schema_history
    out-of-order: false

server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

ch:
  security:
    jwt:
      secret: ${CH_JWT_SECRET:please-change-me-this-is-dev-only-secret-please-change}
      access-ttl: 604800
      issuer: claudecode-hub

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
